<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Simon Jarvers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .not-found-wrap {
      min-height: calc(100vh - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .not-found-inner {
      text-align: center;
      padding: 40px var(--pad);
    }
    .not-found-code {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 20px;
    }
    .not-found-heading {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 14px;
    }
    .not-found-desc {
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .not-found-cta {
      display: inline-block;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--forest);
      border-bottom: 1px solid var(--forest);
      padding-bottom: 1px;
      transition: opacity 0.15s;
    }
    .not-found-cta:hover { opacity: 0.7; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-name" href="index.html">Simon Jarvers</a>
    </div>
  </nav>

  <div class="not-found-wrap">
    <div class="not-found-inner">
      <p class="not-found-code">404</p>
      <h1 class="not-found-heading">Page not found</h1>
      <p class="not-found-desc">The page you were looking for does not exist or has moved.</p>
      <a class="not-found-cta" href="index.html">Back to homepage →</a>
    </div>
  </div>

</body>
</html>
